front:
  text: 玄牝之門賦
  hash: sha256:de073e234f993b04aa9fdf572614abd1ed776709bda45b15de91e24136fe669a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0030_HFL_000-001a, image: hfl/0629/0629-142.png}
body:
  text: 此上玄下牝之門歟一竅玄牝大丹本根是乃虛無之谷互為出入之門設鼎器之尊卑截然對立渾機關之闔闢妙以難言原夫神仙立修鍊之根基元氣常周流於上下鉛爐汞鼎自此而建玉闕金關識之者寡大哉玄牝不可得而名焉通乎陰陽是以謂之門也是曰爐鼎中藏汞鉛東接扶桑之谷西通華嶽之巔據二土之要妙合二土界兩弦之間平分兩弦大以無外小以無內下焉曰牝上焉曰玄朱砂鼎偃月爐一機密運復命關歸根竅衆妙兼全是門也陽開陰闔開闔無窮曰往月來往來不已上曰天關中納乾甲下為地户內藏坤癸無邊無傍非有形也一圍一闢是為門矣高卑配合大矣哉至矣哉來去周遊出乎此入乎此請言夫此竅何竅人所同有非門謂門世其鮮知蓋天地常交合於往往來來之際而神氣每渾融於綿綿續續之時今此鑿破鴻濛之穴築成真一之基以諸辰而論下牝居子合八卦而觀上玄屬離門焉如是分也竅則渾而一之所以紫陽備述罕知之語不然老氏曷陳同出之辭嘗謂冥冥牝户深居滄海之間巍巍玄關遠在崑岡之上一陰一陽黑白可辨非色非空丹青難狀四正於此布勾般乎子午卯酉兩躍於此運攢簇乎晦弦朔望徴哉妙哉玄牝二宇採之鍊之功夫片餉是則下藏白虎為發火之樞機上有青龍起騰雲之風浪噫傍門小法惑衆非一專門名家以賢自居弗解講明於理學安能契合於仙書以心腎名玄牝空費存想以口鼻為玄牝徒勞咽噓儻棄邪歸正獲知蹊徑之真也則造徴入妙豈在門墻之外歟盍思夫一氣孔神曷是收藏之根柢元和內運孰為交接之棹輿抑評之虎白龍青奚云黑虎赤龍玄上牝下何謂左玄右牝當知木火為侣木於火內以停蓄金水同宫金在水中而潛隱此所謂玄之又玄妙之又妙者乎其造化講論而無盡水中金詩一點明金粟川源在水中九還成大藥片餉顯神功元海陽和動寒泉氣脈通須臾為白液凝結滿黃宫藏伏資坤土吹噓藉巽風何當懷此寶去訪吕仙翁右易外别傳一卷為之圖為之説披闡先天圖環中之極玄證以參同契陰符諸書參以伊川橫渠諸儒之至論所以發朱子之所未發以推廣邵子言外之意愚雖弗暇專志從事於斯而丹之妙用非茍知之蓋嘗試之也故敢直指方士之所靳以破學者之惑嘗慨夫世所傳丹家之書庾辭隱語使覽者無罅縫可入往往目眩心醉而掩卷長嘆如蔡季通袁機仲嘗與朱子共訂正參同契矣雖能考其字義然不得其的傳未免臆度而已愚今既得所傳又何忍緘默以自私乃迷是書附於周易集説之後而名之曰易外别傳蓋謂丹家之説雖出於易不過依倣而託之者初非易之本義也丹道之大綱要領子於是書言之悉矣丹道之口訣細微則具載於參同契發揮三篇兹不贅云林屋洞夭石澗真逸俞琰玉吾叟書右易外别傳一卷先君子之所著而附於周易集説之後者也先君子嘗遇隱者以先夭圖指示邵子環中之極玄故是書所著發明邵子之學為多近刊陰符經解兒楨請以是藁繕寫同鋟諸梓併沁園春解三書共為一帙將與四方高士共之因請總名之曰玄學正宗云至正丙申春正月男仲溫百拜謹志
